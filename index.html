<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- PWA -->
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CRM" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="CRM" />
    <meta name="msapplication-TileColor" content="#0a0a0f" />

    <!-- SEO & Open Graph -->
    <meta name="description" content="Lidtek CRM — Gestão de Projetos, Pipeline de Vendas e Tarefas. Sistema interno de gestão completa." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CRM — Lidtek Gestão de Projetos" />
    <meta property="og:description" content="Sistema de CRM, pipeline de vendas, funil de desenvolvimento e gestão de tarefas." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CRM — Lidtek Gestão de Projetos" />
    <meta name="twitter:description" content="Sistema de CRM, pipeline de vendas, funil de desenvolvimento e gestão de tarefas." />
    <meta name="twitter:image" content="/og-image.png" />

    <title>CRM — Lidtek Gestão de Projetos</title>

    <!-- Inline splash screen — visible instantly before JS loads -->
    <style>
      .splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .splash-logo {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: rgba(255,255,255,0.85);
        margin-bottom: 1.5rem;
      }
      .splash-spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid rgba(255,255,255,0.1);
        border-top-color: rgba(255,255,255,0.5);
        border-radius: 50%;
        animation: splash-spin 0.7s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Splash screen: React.createRoot replaces this automatically on mount -->
      <div class="splash-screen" aria-label="Carregando aplicação">
        <div class="splash-logo">CRM</div>
        <div class="splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
